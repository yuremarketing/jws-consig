version: '3.8'
services:
  db:
    image: postgres:15
    container_name: consig-sniper-db-oficial
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: consigsniper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  cache:
    image: redis:alpine
    container_name: consig-sniper-cache
    restart: always
    ports:
      - "6379:6379"
volumes:
  postgres_data:
